<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>El Tri Talent Tracker</title>
<style>
body {font-family: Arial; background:#0f172a; color:#e2e8f0; margin:0;}
.header {padding:20px; background:#020617;}
.section {padding:20px;}
table {width:100%; border-collapse:collapse;}
td, th {padding:10px;}
th {background:#1e293b;}
tr:nth-child(even){background:#020617;}
td {cursor:pointer;}
#profile-view {display:none; padding:20px; animation:fadeIn 0.3s ease;}
@keyframes fadeIn {from{opacity:0;} to{opacity:1;}}
</style>
</head>
<body>

<div class="header">
<h1>🇲🇽 El Tri Talent Tracker</h1>
</div>

<div class="section">
<h2>Call-Up Board</h2>
<table>
<tr><th>Player</th><th>Club</th><th>Call-Up %</th></tr>

<tr onclick="loadProfile('profiles/Santiago_Gimenez.html')">
<td>Santiago Gimenez</td><td>Feyenoord</td><td>95%</td>
</tr>

<tr onclick="loadProfile('profiles/Edson_Alvarez.html')">
<td>Edson Alvarez</td><td>West Ham</td><td>95%</td>
</tr>

<tr onclick="loadProfile('profiles/Julian_Quinones.html')">
<td>Julian Quinones</td><td>Club America</td><td>82%</td>
</tr>

<tr onclick="loadProfile('profiles/Obed_Vargas.html')">
<td>Obed Vargas</td><td>Seattle Sounders</td><td>65%</td>
</tr>

<tr onclick="loadProfile('profiles/Gilberto_Mora.html')">
<td>Gilberto Mora</td><td>Tijuana</td><td>50%</td>
</tr>

</table>
</div>

<div id="profile-view"></div>

<script>
function loadProfile(url){
fetch(url)
.then(res=>res.text())
.then(html=>{
const parser = new DOMParser();
const doc = parser.parseFromString(html,'text/html');
document.getElementById('profile-view').innerHTML = doc.body.innerHTML;
document.getElementById('profile-view').style.display='block';
window.scrollTo({top:0,behavior:'smooth'});
});
}
</script>

</body>
</html>
