<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>El Tri Talent Tracker</title>
<style>
body {font-family: Arial; background:#0f172a; color:#e2e8f0; margin:0;}
.header {padding:20px; background:#020617;}
.section {padding:20px;}
table {width:100%; border-collapse:collapse;}
td, th {padding:10px;}
th {background:#1e293b;}
tr:nth-child(even){background:#020617;}
td {cursor:pointer;}
#profile-view {display:none; padding:20px; animation:fadeIn 0.3s ease;}
@keyframes fadeIn {from{opacity:0;} to{opacity:1;}}
</style>
</head>
<body>

<div class="header">
<h1>🇲🇽 El Tri Talent Tracker</h1>
</div>

<div class="section">
<h2>Call-Up Board</h2>
<table id="player-table">
<tr><th>Player</th><th>Club</th><th>Call-Up %</th></tr>
</table>
</div>

<div id="profile-view"></div>

<script>
function loadProfile(url){
fetch(url)
.then(res=>res.text())
.then(html=>{
const parser = new DOMParser();
const doc = parser.parseFromString(html,'text/html');
document.getElementById('profile-view').innerHTML = doc.body.innerHTML;
document.getElementById('profile-view').style.display='block';
window.scrollTo({top:0,behavior:'smooth'});
});
}
  
fetch('players.csv')
.then(res => res.text())
.then(data => {
  const rows = data.split('\n').slice(1);

  rows.forEach(row => {
    const [name, position, club, status, callup] = row.split(',');

    if (!name) return;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${name}</td>
      <td>${club}</td>
      <td>${callup}%</td>
    `;

    tr.onclick = () => loadProfile(`profiles/${name.replace(/ /g,'_')}.html`);

    document.getElementById('player-table').appendChild(tr);
  });
});
</script>
</body>
</html>
